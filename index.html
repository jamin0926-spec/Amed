<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A+med 科技醫療站</title>
    <style>
        :root {
            --bg-color: #020b1a;
            --primary-glow: #00d2ff;
            --btn-border: rgba(0, 210, 255, 0.5);
            --btn-bg: rgba(0, 210, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* 這裡改用相對單位，讓它適應各種螢幕 */
        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: #fff;
            font-family: "Microsoft JhengHei", sans-serif;
            overflow: hidden; /* 防止出現捲軸 */
            display: flex;
            justify-content: center;
        }

        /* 浮水印：使用 vmin 確保在不同尺寸下字體大小適中 */
        body::before {
            content: "A+med";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 20vmin; 
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
        }

        #app {
            width: 100%;
            max-width: 1080px; /* 限制最大寬度，避免在超寬螢幕上太扁 */
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10vh 5vw; /* 使用視窗百分比作為邊距 */
            position: relative;
            z-index: 1;
        }

        header { text-align: center; margin-bottom: 8vh; }
        header h1 {
            font-size: 8vh; /* 字體隨螢幕高度縮放 */
            background: linear-gradient(to bottom, #fff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }
        .subtitle { font-size: 2.5vh; color: #88a; }

        /* 按鈕容器：使用彈性佈局 */
        .btn-grid {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 3vh;
            align-items: center;
        }

        .sci-btn {
            width: 90%;
            min-height: 10vh; /* 高度隨螢幕縮放 */
            padding: 2vh;
            background: var(--btn-bg);
            border: 2px solid var(--btn-border);
            border-radius: 20px;
            color: #fff;
            font-size: 4vh; /* 文字大小自動調整 */
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: inset 0 0 15px rgba(0, 210, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sci-btn:active {
            transform: scale(0.98);
            background: rgba(0, 210, 255, 0.3);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        /* 內容層次控制 */
        .layer { display: none; width: 100%; }
        .layer.active { display: flex; flex-direction: column; align-items: center; }

        /* 解答頁面：內容框高度也改用相對單位 */
        .content-box {
            width: 100%;
            height: 55vh;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 4vh;
            margin-top: 2vh;
            font-size: 3vh;
            line-height: 1.6;
            overflow-y: auto; /* 若內容太多可內部分別捲動 */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn {
            margin-top: 5vh;
            width: 60%;
            height: 8vh;
            background: #222;
            border: 1px solid #444;
            border-radius: 40px;
            color: #aaa;
            font-size: 3vh;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="layer1" class="layer active">
        <header>
            <h1>A+med</h1>
            <p class="subtitle">智能科技醫療導覽系統</p>
        </header>
        <div class="btn-grid">
            <button class="sci-btn" onclick="goLayer(2, 'dressing')">敷 料</button>
            <button class="sci-btn" onclick="goLayer(2, 'medicine')">藥 品</button>
            <button class="sci-btn" onclick="goLayer(2, 'device')">醫 材</button>
        </div>
    </div>

    <div id="layer2" class="layer">
        <h1 id="category-title" style="font-size: 6vh; margin-bottom: 5vh; text-align: center;">分類標題</h1>
        <div class="btn-grid" id="sub-menu-container"></div>
        <button class="back-btn" onclick="goLayer(1)">◀ 返回主選單</button>
    </div>

    <div id="layer3" class="layer">
        <h1 id="detail-title" style="font-size: 5vh; color: var(--primary-glow); text-align: center;">標題</h1>
        <div class="content-box" id="detail-content"></div>
        <button class="back-btn" onclick="goLayer(2)">◀ 返回列表</button>
    </div>
</div>

<script>
    // 資料結構與前一版相同
    const data = {
        dressing: {
            title: "敷料系列",
            items: [
                { name: "葡聚醣的秘密", info: "這裡填寫關於葡聚醣的秘密詳細介紹..." },
                { name: "術後傷口好夥伴", info: "專業術後護理敷料，提供最佳癒合環境。" },
                { name: "還我好肌膚", info: "針對皮膚修復的進階方案說明。" },
                { name: "赫麗敷保護你的咖投呼", info: "專門針對膝蓋(咖投呼)關節設計的彈性敷料。" },
                { name: "惱人痔瘡別再來", info: "術後舒適護理與舒緩建議內容。" }
            ]
        },
        medicine: {
            title: "藥品系列",
            items: [
                { name: "藥品選項 1", info: "內容 1" }, { name: "藥品選項 2", info: "內容 2" },
                { name: "藥品選項 3", info: "內容 3" }, { name: "藥品選項 4", info: "內容 4" },
                { name: "藥品選項 5", info: "內容 5" }
            ]
        },
        device: {
            title: "醫材系列",
            items: [
                { name: "醫材選項 1", info: "內容 1" },
                { name: "醫材選項 2", info: "內容 2" },
                { name: "醫材選項 3", info: "內容 3" }
            ]
        }
    };

    function goLayer(layerNum, category = '') {
        document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
        document.getElementById('layer' + layerNum).classList.add('active');

        if (layerNum === 2 && category) {
            const categoryData = data[category];
            document.getElementById('category-title').innerText = categoryData.title;
            const container = document.getElementById('sub-menu-container');
            container.innerHTML = '';
            categoryData.items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'sci-btn';
                btn.style.minHeight = '8vh';
                btn.style.fontSize = '3vh';
                btn.innerText = item.name;
                btn.onclick = () => showDetail(item.name, item.info);
                container.appendChild(btn);
            });
        }
    }

    function showDetail(title, content) {
        document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
        document.getElementById('layer3').classList.add('active');
        document.getElementById('detail-title').innerText = title;
        document.getElementById('detail-content').innerHTML = content;
    }
</script>

</body>
</html>
