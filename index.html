<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A+med 科技醫療站</title>
    <style>
        :root {
            --bg-color: #020b1a;
            --primary-glow: #00d2ff;
            --btn-border: rgba(0, 210, 255, 0.5);
            --btn-bg: rgba(0, 210, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: #fff;
            font-family: "Microsoft JhengHei", sans-serif;
            overflow: hidden;
            display: flex; justify-content: center;
        }

        /* A+med 淡淡浮水印 */
        body::before {
            content: "A+med";
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 15vmin; color: rgba(255, 255, 255, 0.02);
            white-space: nowrap; pointer-events: none; z-index: 0;
        }

        #app {
            width: 100%; max-width: 1080px; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            padding: 5vh 5vw; position: relative; z-index: 1;
        }

        header { text-align: center; margin-top: 3vh; margin-bottom: 1vh; flex-shrink: 0; }
        header h1 {
            font-size: 6vh;
            background: linear-gradient(to bottom, #fff, #00d2ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        /* 第一層：正方形按鈕佈局 */
        .square-grid {
            width: 100%;
            flex-grow: 1;
            display: flex; flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2vh;
            padding-bottom: 5vh;
        }

        .square-btn {
            width: 20vh; aspect-ratio: 1 / 1;
            background: var(--btn-bg);
            max-width: 80vw;
            border: 2px solid var(--btn-border);
            border-radius: 25px;
            color: #fff; font-size: 4.5vh; font-weight: bold;
            cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 20px rgba(0, 210, 255, 0.1);
        }

        .square-btn:active { transform: scale(0.95); background: rgba(0, 210, 255, 0.3); }

        /* 第二層：列表按鈕 */
        .list-grid { width: 100%; display: flex; flex-direction: column; gap: 1.8vh; align-items: center; }
        .list-btn {
            width: 90%; min-height: 8vh;
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            border-radius: 12px; color: #fff; font-size: 2.8vh;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center;
            padding: 0 20px;
        }

        .layer { display: none; width: 100%; height: 100%; }
        .layer.active { display: flex; flex-direction: column; align-items: center; }

        /* 第三層：內容展示區 */
        .content-box {
            width: 100%; height: 60vh;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 3vh;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
        }

        .detail-image {
            width: 100%; max-height: 28vh;
            object-fit: contain; border-radius: 10px;
            margin-bottom: 2.5vh; display: none;
            border: 1px solid var(--btn-border);
        }

        .detail-text { font-size: 2.6vh; line-height: 1.6; color: #ddd; }

        .back-btn {
            margin-top: auto; margin-bottom: 3vh;
            width: 50%; height: 7vh; flex-shrink: 0;
            background: #111; border: 1px solid #444;
            border-radius: 40px; color: #aaa; font-size: 2.2vh;
            cursor: pointer;
        }
        .home-btn {
            border: 1px solid var(--primary-glow) !important;
            color: var(--primary-glow) !important;
            background: rgba(0, 210, 255, 0.05) !important;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="layer1" class="layer active">
        <header><h1>A+med</h1></header>
        <div class="square-grid">
            <button class="square-btn" onclick="goLayer(2, 'dressing')">敷 料</button>
            <button class="square-btn" onclick="goLayer(2, 'medicine')">藥 品</button>
            <button class="square-btn" onclick="goLayer(2, 'device')">醫 材</button>
        </div>
    </div>

    <div id="layer2" class="layer">
        <h1 id="category-title" style="font-size: 5vh; margin: 3vh 0; color: var(--primary-glow);"></h1>
        <div class="list-grid" id="sub-menu-container"></div>
        <button class="back-btn" onclick="goLayer(1)">◀ 返回主選單</button>
    </div>

    <div id="layer3" class="layer">
        <h1 id="detail-title" style="font-size: 3.5vh; margin: 2vh 0; text-align: center;"></h1>
        <div class="content-box">
            <img id="detail-img" class="detail-image" src="" alt="產品圖">
            <div id="detail-text" class="detail-text"></div>
        </div>
        <button class="back-btn home-btn" onclick="goLayer(1)"> ↩️ 返回首頁</button>
    </div>
</div>

<script>
    const data = {
        dressing: {
            title: "敷料系列",
            items: [
                // 注意：這裡的 img 欄位請填入你上傳到 GitHub 的圖片檔名
                { name: "葡聚醣的秘密", img: "https://jamin0926-spec.github.io/Amed/A1.png", info: "醫療專用敷料|液態噴霧式敷料|主動式敷料|活性成分，濕潤傷口幫助癒合，適用於各種不規則形狀、大小、或無法使用黏貼型敷料的傷口照護" },
                { name: "術後傷口好夥伴", img: "https://jamin0926-spec.github.io/Amed/A2.png", info: "防水透氣 | 方便使用 |舒適服貼 獨家三層複合式結構內層A+高分子水凝膠，滲液吸收能力佳，維持傷口濕潤均衡狀態，加速傷口癒合。多款尺寸，符合手術傷口類別" },
                { name: "還我好肌膚", img: "p3.jpg", info: "這裡填寫皮膚修復的資訊..." },
                { name: "赫麗敷保護你的咖投呼", img: "p4.jpg", info: "膝蓋關節護理產品說明..." },
                { name: "惱人痔瘡別再來", img: "https://jamin0926-spec.github.io/Amed/A4.png", info: "西海 痔瘡傷口保護敷料，幫助肛裂、痔瘡、產後痔瘡患者，用的安全、坐的舒適，形成保護膜、有效幫助傷口癒合" }
            ]
        },
        medicine: {
            title: "藥品系列",
            items: [
                { name: "1", img: "m1.jpg", info: "藥品 1 說明" },
                { name: "2", img: "m2.jpg", info: "藥品 2 說明" },
                { name: "3", img: "m3.jpg", info: "藥品 3 說明" },
                { name: "4", img: "m4.jpg", info: "藥品 4 說明" },
                { name: "5", img: "m5.jpg", info: "藥品 5 說明" }
            ]
        },
        device: {
            title: "醫材系列",
            items: [
                { name: "1", img: "d1.jpg", info: "醫材 1 說明" },
                { name: "2", img: "d2.jpg", info: "醫材 2 說明" },
                { name: "3", img: "d3.jpg", info: "醫材 3 說明" }
            ]
        }
    };

    function goLayer(layerNum, category = '') {
        document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
        document.getElementById('layer' + layerNum).classList.add('active');

        if (layerNum === 2 && category) {
            const categoryData = data[category];
            document.getElementById('category-title').innerText = categoryData.title;
            const container = document.getElementById('sub-menu-container');
            container.innerHTML = '';
            categoryData.items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'list-btn';
                btn.innerText = item.name;
                btn.onclick = () => showDetail(item.name, item.info, item.img);
                container.appendChild(btn);
            });
        }
    }

    function showDetail(title, info, imgSrc) {
        document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
        document.getElementById('layer3').classList.add('active');
        document.getElementById('detail-title').innerText = title;
        document.getElementById('detail-text').innerHTML = info;

        const imgTag = document.getElementById('detail-img');
        if (imgSrc && imgSrc.trim() !== "") {
            // 如果你圖片跟 index.html 放在一起，直接用檔名即可抓到圖片
            imgTag.src = imgSrc;
            imgTag.style.display = 'block';
        } else {
            imgTag.style.display = 'none';
        }
    }
</script>

</body>
</html>
